<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DealTrack Pro — Contract</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/agent-academy/js/supabase-client.js"></script>
  <script src="/agent-academy/js/auth.js"></script>
  <script src="/agent-academy/js/guard.js"></script>

  <style>
    :root {
      --bg: #0b0f1a;
      --panel: #141a2a;
      --panel-2: #101625;
      --text: #ffffff;
      --muted: #9aa6c2;
      --accent: #1e90ff;
      --border: rgba(255,255,255,0.08);
      --danger: #ef4444;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 24px;
    }

    .page {
      max-width: 980px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .back-link,
    .btn {
      color: var(--text);
      text-decoration: none;
      border: 1px solid var(--border);
      padding: 10px 14px;
      border-radius: 10px;
      background: var(--panel);
      display: inline-block;
    }

    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
    }

    .lang-switcher {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .lang-btn {
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 10px;
      cursor: pointer;
    }

    .lang-btn.is-active {
      background: var(--accent);
      border-color: var(--accent);
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 20px;
      border-radius: 16px;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 30px;
    }

    h2 {
      margin: 0 0 14px;
      font-size: 18px;
      color: #dbe7ff;
    }

    .subtitle {
      color: var(--muted);
      margin: 0 0 22px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .item {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
    }

    .label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .value {
      font-size: 15px;
      color: var(--text);
      word-break: break-word;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .status {
      color: var(--muted);
    }

    .error {
      color: var(--danger);
    }

    @media (max-width: 760px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <a class="back-link" href="/dealtrack-pro/contracts.html" data-i18n="backToContracts">← Back to Contracts</a>

      <div class="lang-switcher">
        <button type="button" class="lang-btn" data-lang-btn="en">EN</button>
        <button type="button" class="lang-btn" data-lang-btn="fr">FR</button>
        <button type="button" class="lang-btn" data-lang-btn="es">ES</button>
      </div>
    </div>

    <div class="actions">
      <a id="addClauseBtn" class="btn btn-primary" href="#" data-i18n="addClauseBtn">➕ Add Clause</a>
    </div>

    <div id="contractView" class="card">
      <h1 data-i18n="loadingTitle">Loading contract...</h1>
      <p class="subtitle" data-i18n="loadingSubtitle">Please wait while the contract details load.</p>
    </div>
  </div>

  <script>
    const I18N = JSON.parse(document.getElementById("dealtrack-contract-i18n").textContent);
    let currentLang = localStorage.getItem("lang") || "en";
    let currentContract = null;

    function t(key) {
      return I18N[currentLang]?.[key] || I18N.en?.[key] || key;
    }

    function applyStaticTranslations() {
      document.documentElement.lang = currentLang;

      document.querySelectorAll("[data-i18n]").forEach((el) => {
        const key = el.getAttribute("data-i18n");
        el.textContent = t(key);
      });

      document.querySelectorAll("[data-lang-btn]").forEach((btn) => {
        btn.classList.toggle("is-active", btn.getAttribute("data-lang-btn") === currentLang);
      });

      document.title = "DealTrack Pro — " + t("sectionContract");
    }

    function safeValue(value) {
      return value || t("na");
    }

    function yesNo(value) {
      return value ? t("yes") : t("no");
    }

    function renderContract(data) {
      const container = document.getElementById("contractView");

      container.innerHTML = `
        <h1>${safeValue(data.player_name)}</h1>
        <p class="subtitle">${t("contractSubtitle")}</p>

        <div class="card">
          <h2>${t("sectionClub")}</h2>
          <div class="grid">
            <div class="item">
              <span class="label">${t("labelClubName")}</span>
              <span class="value">${safeValue(data.club_name)}</span>
            </div>
          </div>
        </div>

        <div class="card">
          <h2>${t("sectionAgent")}</h2>
          <div class="grid">
            <div class="item">
              <span class="label">${t("labelAgentName")}</span>
              <span class="value">${safeValue(data.agent_name)}</span>
            </div>
            <div class="item">
              <span class="label">${t("labelAgentEmail")}</span>
              <span class="value">${safeValue(data.agent_email)}</span>
            </div>
            <div class="item">
              <span class="label">${t("labelAgentLicence")}</span>
              <span class="value">${safeValue(data.agent_licence_number)}</span>
            </div>
            <div class="item">
              <span class="label">${t("labelAgencyName")}</span>
              <span class="value">${safeValue(data.agency_name)}</span>
            </div>
            <div class="item">
              <span class="label">${t("labelAgentCountry")}</span>
              <span class="value">${safeValue(data.agent_country)}</span>
            </div>
            <div class="item">
              <span class="label">${t("labelAgentFederation")}</span>
              <span class="value">${safeValue(data.agent_federation)}</span>
            </div>
            <div class="item">
              <span class="label">${t("labelLicensedAgent")}</span>
              <span class="value">${yesNo(data.is_licensed_agent)}</span>
            </div>
          </div>
        </div>

        <div class="card">
          <h2>${t("sectionContract")}</h2>
          <div class="grid">
            <div class="item">
              <span class="label">${t("labelStartDate")}</span>
              <span class="value">${safeValue(data.start_date)}</span>
            </div>
            <div class="item">
              <span class="label">${t("labelEndDate")}</span>
              <span class="value">${safeValue(data.end_date)}</span>
            </div>
          </div>
        </div>

        <div class="card">
          <h2>${t("sectionSalary")}</h2>
          <div class="grid">
            <div class="item">
              <span class="label">${t("labelSalaryAmount")}</span>
              <span class="value">${safeValue(data.salary)}</span>
            </div>
            <div class="item">
              <span class="label">${t("labelSalaryFrequency")}</span>
              <span class="value">${safeValue(data.salary_frequency)}</span>
            </div>
            <div class="item">
              <span class="label">${t("labelSalaryCurrency")}</span>
              <span class="value">${safeValue(data.salary_currency)}</span>
            </div>
          </div>
        </div>

        <div class="card">
          <h2>${t("sectionCommission")}</h2>
          <div class="grid">
            <div class="item">
              <span class="label">${t("labelCommissionType")}</span>
              <span class="value">${safeValue(data.commission_type)}</span>
            </div>
            <div class="item">
              <span class="label">${t("labelCommissionValue")}</span>
              <span class="value">${safeValue(data.commission_value)}</span>
            </div>
            <div class="item">
              <span class="label">${t("labelCommissionCurrency")}</span>
              <span class="value">${safeValue(data.commission_currency)}</span>
            </div>
            <div class="item">
              <span class="label">${t("labelCommissionPayer")}</span>
              <span class="value">${safeValue(data.commission_payer)}</span>
            </div>
            <div class="item">
              <span class="label">${t("labelCommissionFrequency")}</span>
              <span class="value">${safeValue(data.commission_frequency)}</span>
            </div>
            <div class="item">
              <span class="label">${t("labelCommissionInstalments")}</span>
              <span class="value">${safeValue(data.commission_instalments)}</span>
            </div>
            <div class="item">
              <span class="label">${t("labelDualRepresentation")}</span>
              <span class="value">${yesNo(data.is_dual_representation)}</span>
            </div>
          </div>
        </div>
      `;
    }

    document.addEventListener("DOMContentLoaded", async () => {
      applyStaticTranslations();

      document.querySelectorAll("[data-lang-btn]").forEach((btn) => {
        btn.addEventListener("click", () => {
          currentLang = btn.getAttribute("data-lang-btn");
          localStorage.setItem("lang", currentLang);
          applyStaticTranslations();
          if (currentContract) renderContract(currentContract);
        });
      });

      const db = window.supabaseClient || window.sb || null;
      const container = document.getElementById("contractView");

      if (!db) {
        container.innerHTML = `<p class="error">${t("errorSupabase")}</p>`;
        return;
      }

      const { data: { user }, error: userError } = await db.auth.getUser();

      if (userError || !user) {
        window.location.href = "/agent-academy/login.html";
        return;
      }

      const params = new URLSearchParams(window.location.search);
      const id = params.get("id");

      const addClauseBtn = document.getElementById("addClauseBtn");
      if (addClauseBtn && id) {
        addClauseBtn.href = `/dealtrack-pro/add-clause.html?contract_id=${id}`;
      }

      if (!id) {
        container.innerHTML = `<p class="error">${t("errorMissingId")}</p>`;
        return;
      }

      const { data, error } = await db
        .from("contracts")
        .select("*")
        .eq("id", id)
        .eq("user_id", user.id)
        .single();

      if (error || !data) {
        console.error("Load contract error:", error);
        container.innerHTML = `<p class="error">${t("errorNotFound")}</p>`;
        return;
      }

      currentContract = data;
      renderContract(data);
    });
  </script>
</body>
</html>

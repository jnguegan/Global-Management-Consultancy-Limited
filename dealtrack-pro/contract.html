<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>DealTrack Pro — Contract</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/agent-academy/js/supabase-client.js"></script>
  <script src="/agent-academy/js/auth.js"></script>
  <script src="/agent-academy/js/guard.js"></script>

  <style>
    body {
      font-family: Inter, sans-serif;
      background: #0b0f1a;
      color: white;
      padding: 20px;
    }

    .btn {
      padding: 10px 14px;
      background: #1e90ff;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      margin-bottom: 20px;
    }

    .card {
      background: #141a2a;
      padding: 18px;
      border-radius: 10px;
      margin-bottom: 16px;
    }

    .muted {
      opacity: 0.8;
    }
  </style>
</head>
<body>

  <a class="btn" href="/dealtrack-pro/contracts.html">← Back to Contracts</a>

  <div id="contractView" class="card">Loading contract...</div>
  <a id="addClauseBtn" class="btn">➕ Add Clause</a>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const db = window.supabaseClient || window.sb || null;
      const container = document.getElementById("contractView");

      if (!db) {
        container.textContent = "Supabase client not available.";
        return;
      }

      const { data: { user }, error: userError } = await db.auth.getUser();

      if (userError || !user) {
        window.location.href = "/agent-academy/login.html";
        return;
      }

      const params = new URLSearchParams(window.location.search);
      const id = params.get("id");
      const addClauseBtn = document.getElementById("addClauseBtn");

if (addClauseBtn && id) {
  addClauseBtn.href = `/dealtrack-pro/add-clause.html?contract_id=${id}`;
}

      if (!id) {
        container.textContent = "Missing contract ID.";
        return;
      }

      const { data, error } = await db
        .from("contracts")
        .select("*")
        .eq("id", id)
        .eq("user_id", user.id)
        .single();

      if (error || !data) {
        console.error("Load contract error:", error);
        container.textContent = "Contract not found.";
        return;
      }

      container.innerHTML = `
  <h1>${data.player_name}</h1>

  <h3>Club</h3>
  <p>${data.club_name || "No club"}</p>

  <h3>Agent</h3>
  <p><strong>Name:</strong> ${data.agent_name || "-"}</p>
  <p><strong>Email:</strong> ${data.agent_email || "-"}</p>
  <p><strong>Licence:</strong> ${data.agent_licence_number || "-"}</p>
  <p><strong>Agency:</strong> ${data.agency_name || "-"}</p>
  <p><strong>Country:</strong> ${data.agent_country || "-"}</p>
  <p><strong>Federation:</strong> ${data.agent_federation || "-"}</p>
  <p><strong>Licensed:</strong> ${data.is_licensed_agent ? "Yes" : "No"}</p>

  <h3>Contract</h3>
  <p><strong>Start:</strong> ${data.start_date || "-"}</p>
  <p><strong>End:</strong> ${data.end_date || "-"}</p>

  <h3>Salary</h3>
  <p><strong>Amount:</strong> ${data.salary || "-"} ${data.salary_currency || ""}</p>
  <p><strong>Frequency:</strong> ${data.salary_frequency || "-"}</p>

  <h3>Commission</h3>
  <p><strong>Type:</strong> ${data.commission_type || "-"}</p>
  <p><strong>Value:</strong> ${data.commission_value || "-"}</p>
  <p><strong>Currency:</strong> ${data.commission_currency || "-"}</p>
  <p><strong>Payer:</strong> ${data.commission_payer || "-"}</p>
  <p><strong>Frequency:</strong> ${data.commission_frequency || "-"}</p>
  <p><strong>Instalments:</strong> ${data.commission_instalments || "-"}</p>
  <p><strong>Dual Representation:</strong> ${data.is_dual_representation ? "Yes" : "No"}</p>
`;
    });
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DealTrack Pro — Contract</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/agent-academy/js/supabase-client.js"></script>
  <script src="/agent-academy/js/auth.js"></script>
  <script src="/agent-academy/js/guard.js"></script>

  <style>
    :root {
      --bg: #020b1d;
      --bg-2: #07152f;
      --panel: rgba(10, 24, 52, 0.88);
      --panel-strong: rgba(12, 28, 58, 0.96);
      --panel-soft: rgba(255,255,255,0.03);
      --border: rgba(255,255,255,0.08);
      --border-strong: rgba(212, 175, 55, 0.22);
      --text: #f6f8fc;
      --muted: #9fb0cf;
      --blue: #2f8cff;
      --blue-2: #58a6ff;
      --gold: #d4af37;
      --gold-2: #f0c85a;
      --danger: #ef4444;
      --shadow: 0 18px 60px rgba(0,0,0,0.36);
      --radius: 20px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(47,140,255,0.18), transparent 28%),
        radial-gradient(circle at top right, rgba(212,175,55,0.12), transparent 24%),
        linear-gradient(180deg, #010814 0%, #05122a 45%, #020b1d 100%);
      min-height: 100vh;
      padding: 24px;
    }

    .page {
      max-width: 1240px;
      margin: 0 auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap;
      padding: 14px 0 18px;
      margin-bottom: 22px;
      background: linear-gradient(180deg, rgba(2,11,29,0.95) 0%, rgba(2,11,29,0.82) 100%);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .topbar-left,
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .brand {
  display: flex;
  flex-direction: column;
  margin-right: 12px;
}

.brand-title {
  font-size: 16px;
  font-weight: 800;
  letter-spacing: -0.01em;
  color: #ffffff;
}

.brand-sub {
  font-size: 11px;
  color: var(--gold-2);
  opacity: 0.85;
  letter-spacing: 0.08em;
}

    .brand-title {
  font-size: 20px;
  font-weight: 900;
  letter-spacing: -0.02em;
}

.brand-main {
  color: #ffffff;
}

.brand-pro {
  color: #d4af37;
  margin-left: 6px;
}

.brand-tagline {
  font-size: 11px;
  color: #bfa046;
  margin-top: 2px;
}
    .back-link,
    .btn,
    .lang-btn {
      appearance: none;
      border: 1px solid var(--border);
      border-radius: 14px;
      text-decoration: none;
      color: var(--text);
      background: linear-gradient(180deg, rgba(255,255,255,0.045), rgba(255,255,255,0.02));
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
      transition: 0.2s ease;
    }

    .back-link,
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 48px;
      padding: 0 16px;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .back-link:hover,
    .btn:hover,
    .lang-btn:hover {
      transform: translateY(-1px);
      border-color: rgba(255,255,255,0.16);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--blue) 0%, var(--blue-2) 100%);
      border-color: rgba(88,166,255,0.35);
      color: white;
      box-shadow: 0 14px 30px rgba(47,140,255,0.22);
    }

    .btn-gold {
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-2) 100%);
      color: #09111f;
      border-color: rgba(212,175,55,0.55);
      box-shadow: 0 14px 30px rgba(212,175,55,0.18);
    }

    .lang-switcher {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .lang-btn {
      min-width: 54px;
      min-height: 46px;
      padding: 0 14px;
      cursor: pointer;
      font-weight: 700;
      opacity: 0.86;
    }

    .lang-btn.is-active {
      background: linear-gradient(135deg, var(--blue) 0%, var(--blue-2) 100%);
      border-color: rgba(88,166,255,0.35);
      color: #fff;
      opacity: 1;
      box-shadow: 0 10px 24px rgba(47,140,255,0.24);
    }

    .hero {
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(135deg, rgba(47,140,255,0.12), transparent 42%),
        linear-gradient(160deg, rgba(212,175,55,0.08), transparent 55%),
        var(--panel-strong);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 30px 30px 26px;
      box-shadow: var(--shadow);
      margin-bottom: 22px;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 85% 20%, rgba(212,175,55,0.12), transparent 25%);
      pointer-events: none;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gold-2);
      margin-bottom: 14px;
      font-weight: 700;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 4vw, 3.25rem);
      line-height: 1.05;
      letter-spacing: -0.03em;
    }

    .hero p {
      margin: 0;
      max-width: 820px;
      color: var(--muted);
      font-size: 1.02rem;
      line-height: 1.65;
    }

    .hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 22px;
    }

    .meta-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 42px;
      padding: 0 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.95rem;
    }

    .meta-pill strong {
      color: var(--gold-2);
      font-weight: 700;
    }

    .layout {
      display: grid;
      grid-template-columns: 1.2fr 0.95fr;
      gap: 22px;
      align-items: start;
    }

    .stack {
      display: grid;
      gap: 22px;
    }

    .premium-card {
      background: linear-gradient(180deg, rgba(11,24,52,0.96), rgba(7,20,43,0.96));
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 22px;
      box-shadow: var(--shadow);
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
    }

    .section-title {
      margin: 0;
      font-size: 1.12rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .section-kicker {
      font-size: 0.84rem;
      color: var(--gold-2);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 700;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .data-tile {
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.015));
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 18px;
      padding: 16px 16px 15px;
      min-height: 92px;
    }

    .tile-label {
      display: block;
      font-size: 0.8rem;
      line-height: 1.2;
      color: var(--muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 700;
    }

    .tile-value {
      font-size: 1rem;
      line-height: 1.45;
      color: var(--text);
      word-break: break-word;
      font-weight: 600;
    }

    .summary-card {
      padding: 0;
      overflow: hidden;
    }

    .summary-top {
      padding: 22px 22px 18px;
      border-bottom: 1px solid var(--border);
      background:
        linear-gradient(135deg, rgba(47,140,255,0.08), transparent 50%),
        linear-gradient(180deg, rgba(255,255,255,0.03), transparent);
    }

    .summary-top h2 {
      margin: 0 0 8px;
      font-size: 1.2rem;
      letter-spacing: -0.02em;
    }

    .summary-top p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .summary-list {
      padding: 18px 22px 22px;
      display: grid;
      gap: 12px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(255,255,255,0.05);
    }

    .summary-row .left {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .summary-row .right {
      color: var(--text);
      font-weight: 700;
      text-align: right;
    }

    .status-box {
      padding: 18px 20px;
      border-radius: 18px;
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.18);
      color: #ffd5d5;
    }

    .muted {
      color: var(--muted);
    }

    .empty {
      color: var(--muted);
      font-weight: 600;
    }

    @media (max-width: 1050px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      body {
        padding: 16px;
      }

      .hero,
      .premium-card {
        padding: 18px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .topbar {
        padding-top: 10px;
      }

      .back-link,
      .btn {
        width: 100%;
      }

      .topbar-left,
      .topbar-right,
      .actions {
        width: 100%;
      }
    }
  </style>
</head>

  <script>
    const I18N = JSON.parse(document.getElementById("dealtrack-contract-i18n").textContent);
    let currentLang = localStorage.getItem("lang") || "en";
    let currentContract = null;

    function t(key) {
      return I18N[currentLang]?.[key] || I18N.en?.[key] || key;
    }

    function applyStaticTranslations() {
      document.documentElement.lang = currentLang;

      document.querySelectorAll("[data-i18n]").forEach((el) => {
        const key = el.getAttribute("data-i18n");
        el.textContent = t(key);
      });

      document.querySelectorAll("[data-lang-btn]").forEach((btn) => {
        btn.classList.toggle("is-active", btn.getAttribute("data-lang-btn") === currentLang);
      });

      document.title = "DealTrack Pro — " + (currentContract?.player_name || t("sectionContract"));
    }

    function safeValue(value) {
      return value || `<span class="empty">${t("na")}</span>`;
    }

    function yesNo(value) {
      return value ? t("yes") : t("no");
    }

    function moneyLine(amount, currency, frequency) {
      const a = amount ?? null;
      const c = currency || "";
      const f = frequency || "";
      if (a === null || a === "" || typeof a === "undefined") return t("na");
      return `${a} ${c}${f ? ` · ${f}` : ""}`.trim();
    }

    function renderTile(labelKey, valueHtml) {
      return `
        <div class="data-tile">
          <span class="tile-label">${t(labelKey)}</span>
          <div class="tile-value">${valueHtml}</div>
        </div>
      `;
    }

    function renderContract(data) {
      const container = document.getElementById("contractView");

      container.innerHTML = `
        <section class="hero">
          <div class="eyebrow">${t("heroEyebrow")}</div>
          <h1>${safeValue(data.player_name)}</h1>
          <p>${t("heroSubtitle")}</p>

          <div class="hero-meta">
            <div class="meta-pill"><strong>${t("metaStatus")}:</strong> ${safeValue(data.status || "active")}</div>
            <div class="meta-pill"><strong>${t("metaSalary")}:</strong> ${moneyLine(data.salary, data.salary_currency, data.salary_frequency)}</div>
            <div class="meta-pill"><strong>${t("metaCommission")}:</strong> ${safeValue(data.commission_type)}</div>
          </div>
        </section>

        <div class="layout">
          <div class="stack">
            <section class="premium-card">
              <div class="section-head">
                <div>
                  <div class="section-kicker">01</div>
                  <h2 class="section-title">${t("sectionClub")}</h2>
                </div>
              </div>
              <div class="grid">
                ${renderTile("labelClubName", safeValue(data.club_name))}
              </div>
            </section>

            <section class="premium-card">
              <div class="section-head">
                <div>
                  <div class="section-kicker">02</div>
                  <h2 class="section-title">${t("sectionAgent")}</h2>
                </div>
              </div>
              <div class="grid">
                ${renderTile("labelAgentName", safeValue(data.agent_name))}
                ${renderTile("labelAgentEmail", safeValue(data.agent_email))}
                ${renderTile("labelAgentLicence", safeValue(data.agent_licence_number))}
                ${renderTile("labelAgencyName", safeValue(data.agency_name))}
                ${renderTile("labelAgentCountry", safeValue(data.agent_country))}
                ${renderTile("labelAgentFederation", safeValue(data.agent_federation))}
                ${renderTile("labelLicensedAgent", yesNo(data.is_licensed_agent))}
              </div>
            </section>

            <section class="premium-card">
              <div class="section-head">
                <div>
                  <div class="section-kicker">03</div>
                  <h2 class="section-title">${t("sectionContract")}</h2>
                </div>
              </div>
              <div class="grid">
                ${renderTile("labelStartDate", safeValue(data.start_date))}
                ${renderTile("labelEndDate", safeValue(data.end_date))}
              </div>
            </section>
          </div>

          <div class="stack">
            <section class="premium-card">
              <div class="section-head">
                <div>
                  <div class="section-kicker">04</div>
                  <h2 class="section-title">${t("sectionSalary")}</h2>
                </div>
              </div>
              <div class="grid">
                ${renderTile("labelSalaryAmount", safeValue(data.salary))}
                ${renderTile("labelSalaryCurrency", safeValue(data.salary_currency))}
                ${renderTile("labelSalaryFrequency", safeValue(data.salary_frequency))}
              </div>
            </section>

            <section class="premium-card">
              <div class="section-head">
                <div>
                  <div class="section-kicker">05</div>
                  <h2 class="section-title">${t("sectionCommission")}</h2>
                </div>
              </div>
              <div class="grid">
                ${renderTile("labelCommissionType", safeValue(data.commission_type))}
                ${renderTile("labelCommissionValue", safeValue(data.commission_value))}
                ${renderTile("labelCommissionCurrency", safeValue(data.commission_currency))}
                ${renderTile("labelCommissionPayer", safeValue(data.commission_payer))}
                ${renderTile("labelCommissionFrequency", safeValue(data.commission_frequency))}
                ${renderTile("labelCommissionInstalments", safeValue(data.commission_instalments))}
                ${renderTile("labelDualRepresentation", yesNo(data.is_dual_representation))}
              </div>
            </section>

            <section class="premium-card summary-card">
              <div class="summary-top">
                <h2>${t("sectionSnapshot")}</h2>
                <p>${t("sectionSnapshotText")}</p>
              </div>
              <div class="summary-list">
                <div class="summary-row">
                  <div class="left">${t("snapshotPlayer")}</div>
                  <div class="right">${data.player_name || t("na")}</div>
                </div>
                <div class="summary-row">
                  <div class="left">${t("snapshotClub")}</div>
                  <div class="right">${data.club_name || t("na")}</div>
                </div>
                <div class="summary-row">
                  <div class="left">${t("snapshotAgent")}</div>
                  <div class="right">${data.agent_name || t("na")}</div>
                </div>
                <div class="summary-row">
                  <div class="left">${t("snapshotPayer")}</div>
                  <div class="right">${data.commission_payer || t("na")}</div>
                </div>
                <div class="summary-row">
                  <div class="left">${t("snapshotDual")}</div>
                  <div class="right">${yesNo(data.is_dual_representation)}</div>
                </div>
              </div>
            </section>
          </div>
        </div>
      `;
    }

    document.addEventListener("DOMContentLoaded", async () => {
      applyStaticTranslations();

      document.querySelectorAll("[data-lang-btn]").forEach((btn) => {
        btn.addEventListener("click", () => {
          currentLang = btn.getAttribute("data-lang-btn");
          localStorage.setItem("lang", currentLang);
          applyStaticTranslations();
          if (currentContract) renderContract(currentContract);
        });
      });

      const db = window.supabaseClient || window.sb || null;
      const container = document.getElementById("contractView");

      if (!db) {
        container.innerHTML = `<div class="status-box">${t("errorSupabase")}</div>`;
        return;
      }

      const { data: { user }, error: userError } = await db.auth.getUser();

      if (userError || !user) {
        window.location.href = "/agent-academy/login.html";
        return;
      }

      const params = new URLSearchParams(window.location.search);
      const id = params.get("id");

      const addClauseBtn = document.getElementById("addClauseBtn");
      if (addClauseBtn && id) {
        addClauseBtn.href = `/dealtrack-pro/add-clause.html?contract_id=${id}`;
      }

      const editContractBtn = document.getElementById("editContractBtn");
      if (editContractBtn && id) {
        editContractBtn.href = `/dealtrack-pro/edit-contract.html?id=${id}`;
      }

      if (!id) {
        container.innerHTML = `<div class="status-box">${t("errorMissingId")}</div>`;
        return;
      }

      const { data, error } = await db
        .from("contracts")
        .select("*")
        .eq("id", id)
        .eq("user_id", user.id)
        .single();

      if (error || !data) {
        console.error("Load contract error:", error);
        container.innerHTML = `<div class="status-box">${t("errorNotFound")}</div>`;
        return;
      }

      currentContract = data;
      applyStaticTranslations();
      renderContract(data);
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Add Contract</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      font-family: Inter, sans-serif;
      background: #0b0f1a;
      color: white;
      padding: 20px;
    }

    input, button {
      display: block;
      margin-bottom: 10px;
      padding: 10px;
      width: 300px;
    }

    button {
      background: #1e90ff;
      border: none;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1>➕ Add Contract</h1>

  <input id="player" placeholder="Player Name" />
  <input id="club" placeholder="Club Name" />

  <button onclick="addContract()">Save</button>

  <script>
    console.log("Script loaded");

    // Safe Supabase init (no duplicates)
    if (!window.supabaseClient) {
      window.supabaseClient = window.supabase.createClient(
        "https://ysaxtuvuzqkyfmganven.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlzYXh0dXZ1enFreWZtZ2FudmVuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NDYzNzMsImV4cCI6MjA4ODQyMjM3M30.gzKSSNA5jtR5JtZWnjP7zVBUDsgxwnCHVnnDZeZb8lo"
      );
    }

    const supabase = window.supabaseClient;

    async function init() {
      const { data: { session } } = await supabase.auth.getSession();

      if (!session) {
        alert("You must be logged in");
        window.location.href = "/login.html";
        return;
      }
    }

    async function addContract() {
      console.log("addContract triggered");

      const player = document.getElementById("player").value;
      const club = document.getElementById("club").value;

      const { error } = await supabase
        .from("contracts")
        .insert({
          player_name: player,
          club_name: club
        });

      if (error) {
        alert("Error: " + error.message);
        return;
      }

      alert("Contract added!");
      window.location.href = "contracts.html";
    }

    init();
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Add Contract</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/agent-academy/js/supabase-client.js"></script>
<script src="/agent-academy/js/auth.js"></script>
<script src="/agent-academy/js/guard.js"></script>

  <style>
    body {
      font-family: Inter, sans-serif;
      background: #0b0f1a;
      color: white;
      padding: 20px;
    }

    input, button {
      display: block;
      margin-bottom: 10px;
      padding: 10px;
      width: 300px;
    }

    button {
      background: #1e90ff;
      border: none;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1>➕ Add Contract</h1>

  <input id="player" placeholder="Player Name" />
  <input id="club" placeholder="Club Name" />

  <button id="saveBtn">Save</button>

 <script>
  document.addEventListener("DOMContentLoaded", async () => {
    const db = window.supabaseClient || window.sb || null;

    if (!db) {
      alert("Supabase client not available");
      return;
    }

    const { data: { user }, error: userError } = await db.auth.getUser();

    if (userError || !user) {
      window.location.href = "/agent-academy/login.html";
      return;
    }

    const saveBtn = document.getElementById("saveBtn");
    if (!saveBtn) {
      alert("Save button not found");
      return;
    }

    saveBtn.addEventListener("click", async () => {
      const player = document.getElementById("player")?.value?.trim();
      const club = document.getElementById("club")?.value?.trim();

      if (!player) {
        alert("Player name is required");
        return;
      }

      const { error } = await db
        .from("contracts")
        .insert({
          user_id: user.id,
          player_name: player,
          club_name: club
        });

      if (error) {
        console.error("Insert error:", error);
        alert("Error: " + error.message);
        return;
      }

      alert("Contract added!");
      window.location.href = "/dealtrack/contracts.html";
    });
  });
</script>
</body>
</html>

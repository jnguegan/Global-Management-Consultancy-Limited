<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>DealTrack Pro — Contracts</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/agent-academy/js/supabase-client.js"></script>
  <script src="/agent-academy/js/auth.js"></script>
  <script src="/agent-academy/js/guard.js"></script>

  <style>
    body {
      font-family: Inter, sans-serif;
      background: #0b0f1a;
      color: white;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .topbar {
  position: sticky;
  top: 0;
  z-index: 1000;

  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;

  padding: 12px 0;
  margin-bottom: 20px;

  background: var(--bg);
  border-bottom: 1px solid var(--border);
}

    .btn {
      padding: 10px 14px;
      background: #1e90ff;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }

    .card {
      background: #141a2a;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 12px;
    }

    .muted {
      opacity: 0.8;
    }
  </style>
</head>
<body>

  <h1>📄 Contracts</h1>

  <div class="topbar">
    <a class="btn" href="/dealtrack/add-contract.html">➕ Add Contract</a>
  </div>

  <div id="contractsList" class="muted">Loading contracts...</div>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const db = window.supabaseClient || window.sb || null;

      if (!db) {
        document.getElementById("contractsList").textContent = "Supabase client not available.";
        return;
      }

      const { data: { user }, error: userError } = await db.auth.getUser();

      if (userError || !user) {
        window.location.href = "/agent-academy/login.html";
        return;
      }

      const { data, error } = await db
        .from("contracts")
        .select("*")
        .eq("user_id", user.id)
        .order("created_at", { ascending: false });

      const container = document.getElementById("contractsList");

      if (error) {
        console.error("Load contracts error:", error);
        container.textContent = "Error loading contracts.";
        return;
      }

      if (!data || data.length === 0) {
        container.textContent = "No contracts yet.";
        return;
      }

      container.innerHTML = data.map(contract => `
  <a href="/dealtrack-pro/contract.html?id=${contract.id}" style="text-decoration:none; color:inherit;">
    <div class="card">
      <strong>${contract.player_name}</strong><br>
      <span>${contract.club_name || "No club"}</span><br>
      <span class="muted">Status: ${contract.status || "active"}</span>
    </div>
  </a>
`).join("");
    });
  </script>

</body>
</html>

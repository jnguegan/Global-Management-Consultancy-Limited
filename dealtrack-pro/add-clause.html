<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Add Clause</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/agent-academy/js/supabase-client.js"></script>
  <script src="/agent-academy/js/auth.js"></script>
  <script src="/agent-academy/js/guard.js"></script>

  <style>
    body {
      font-family: Inter, sans-serif;
      background: #0b0f1a;
      color: white;
      padding: 20px;
    }

    input, select, textarea, button {
      display: block;
      margin-bottom: 12px;
      padding: 10px;
      width: 320px;
      max-width: 100%;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    button, .btn {
      background: #1e90ff;
      border: none;
      color: white;
      cursor: pointer;
      text-decoration: none;
      border-radius: 6px;
      display: inline-block;
    }

    .btn {
      padding: 10px 14px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

  <a id="backBtn" class="btn" href="/dealtrack-pro/contracts.html">← Back</a>

  <h1>➕ Add Clause</h1>

  <select id="clauseType">
    <option value="fixed_fee">Fixed Fee</option>
    <option value="percentage_salary">Percentage of Salary</option>
    <option value="transfer_fee_percentage">Percentage of Transfer Fee</option>
    <option value="bonus">Bonus</option>
  </select>

  <input id="value" type="number" step="0.01" placeholder="Value" />

  <select id="triggerEvent">
    <option value="contract_signed">Contract Signed</option>
    <option value="salary_paid">Salary Paid</option>
    <option value="transfer_completed">Transfer Completed</option>
    <option value="bonus_earned">Bonus Earned</option>
  </select>

  <select id="frequency">
    <option value="one_time">One Time</option>
    <option value="monthly">Monthly</option>
    <option value="per_event">Per Event</option>
  </select>

  <textarea id="description" placeholder="Description (optional)"></textarea>

  <button id="saveClauseBtn">Save Clause</button>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const db = window.supabaseClient || window.sb || null;

      if (!db) {
        alert("Supabase client not available");
        return;
      }

      const { data: { user }, error: userError } = await db.auth.getUser();

      if (userError || !user) {
        window.location.href = "/agent-academy/login.html";
        return;
      }

      const params = new URLSearchParams(window.location.search);
      const contractId = params.get("contract_id");

      if (!contractId) {
        alert("Missing contract_id");
        return;
      }

      const backBtn = document.getElementById("backBtn");
      backBtn.href = `/dealtrack-pro/contract.html?id=${contractId}`;

      const saveBtn = document.getElementById("saveClauseBtn");

      saveBtn.addEventListener("click", async () => {
        const clauseType = document.getElementById("clauseType").value;
        const value = document.getElementById("value").value;
        const triggerEvent = document.getElementById("triggerEvent").value;
        const frequency = document.getElementById("frequency").value;
        const description = document.getElementById("description").value.trim();

        if (!value) {
          alert("Value is required");
          return;
        }

        const { error } = await db
          .from("clauses")
          .insert({
            contract_id: contractId,
            clause_type: clauseType,
            value: Number(value),
            trigger_event: triggerEvent,
            frequency: frequency,
            description: description
          });

        if (error) {
          console.error("Insert clause error:", error);
          alert("Error: " + error.message);
          return;
        }

        alert("Clause added!");
        window.location.href = `/dealtrack-pro/contract.html?id=${contractId}`;
      });
    });
  </script>

</body>
</html>

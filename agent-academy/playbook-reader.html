<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Academy Playbook</title>

  <style>
    :root{
      --bg:#0b1220;
      --panel:#162033;
      --text:#f5f7fb;
      --muted:#b7c0cf;
      --gold:#d4af37;
      --border:rgba(255,255,255,0.08);
    }

    body{
      margin:0;
      font-family:Arial,Helvetica,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:16px 24px;
      border-bottom:1px solid var(--border);
      background:#121a2b;
    }

    .brand{
      font-weight:700;
    }

    .lang-switch button{
      margin-left:6px;
      padding:6px 10px;
      border-radius:6px;
      border:1px solid var(--border);
      background:transparent;
      color:white;
      cursor:pointer;
    }

    .layout{
      display:grid;
      grid-template-columns:280px 1fr;
      min-height:calc(100vh - 60px);
    }

    .sidebar{
      border-right:1px solid var(--border);
      padding:20px;
    }

    .sidebar h3{
      margin-top:0;
    }

    .article-link{
      display:block;
      padding:8px 0;
      cursor:pointer;
      color:var(--muted);
    }

    .article-link:hover{
      color:var(--gold);
    }

    .content{
      padding:40px;
      max-width:900px;
    }

    .article-title{
      font-size:28px;
      margin-bottom:20px;
    }

    .article-text{
      line-height:1.7;
      margin-bottom:30px;
    }

    .explanation{
      padding:20px;
      background:var(--panel);
      border-radius:10px;
      margin-bottom:30px;
    }

    .actions{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin-top:10px;
    }

    .actions a{
      padding:10px 16px;
      border-radius:8px;
      background:var(--gold);
      color:#07111f;
      text-decoration:none;
      font-weight:700;
    }

    .related-questions{
      margin-top:28px;
      padding:20px;
      background:var(--panel);
      border-radius:10px;
    }

    .related-questions h3{
      margin-top:0;
    }

    .question-links{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }

    .question-link{
      display:inline-block;
      padding:8px 12px;
      border-radius:8px;
      background:rgba(212,175,55,0.14);
      color:var(--gold);
      text-decoration:none;
      border:1px solid rgba(212,175,55,0.24);
    }

    .question-link.disabled{
      opacity:0.6;
      pointer-events:none;
    }

    .question-empty{
      color:var(--muted);
      font-size:14px;
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="brand">Agent Academy Playbook</div>

    <div class="lang-switch">
      <button data-lang="en">EN</button>
      <button data-lang="fr">FR</button>
      <button data-lang="es">ES</button>
    </div>
  </div>

  <div class="layout">
    <div class="sidebar">
      <h3 id="playbookSidebarTitle">Playbook</h3>
      <div id="articleList"></div>
    </div>

    <div class="content">
      <div id="articleContent">
        <h2 class="article-title" id="defaultArticleTitle">Select a section</h2>
        <p class="article-text" id="defaultArticleText">Choose a playbook article from the left.</p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseClient = window.supabase.createClient(
      "https://ysaxtuvuzqkyfmganven.supabase.co",
      "sb_publishable_esfhuUEIcUJEL6z9zryRAA_FGMmUHlw"
    );

    let lang = localStorage.getItem("lang") || "en";
    let currentArticle = null;

    const readerText = {
      en: {
        openRegulation: "Open Regulation",
        practiceQuestions: "Practice Questions",
        keyQuestions: "Key Questions for this Article",
        question: "Question",
        selectSectionTitle: "Select a section",
        selectSectionText: "Choose a playbook article from the left.",
        explanation: "Explanation",
        playbook: "Playbook",
        noPracticeQuestions: "No practice questions yet."
      },
      fr: {
        openRegulation: "Ouvrir le règlement",
        practiceQuestions: "Questions de pratique",
        keyQuestions: "Questions clés pour cet article",
        question: "Question",
        selectSectionTitle: "Sélectionnez une section",
        selectSectionText: "Choisissez un article du playbook à gauche.",
        explanation: "Explication",
        playbook: "Playbook",
        noPracticeQuestions: "Aucune question de pratique pour le moment."
      },
      es: {
        openRegulation: "Abrir reglamento",
        practiceQuestions: "Preguntas de práctica",
        keyQuestions: "Preguntas clave para este artículo",
        question: "Pregunta",
        selectSectionTitle: "Seleccione una sección",
        selectSectionText: "Elija un artículo del playbook a la izquierda.",
        explanation: "Explicación",
        playbook: "Playbook",
        noPracticeQuestions: "Todavía no hay preguntas de práctica."
      }
    };

    function rt(key) {
      return readerText[lang]?.[key] || readerText.en[key] || key;
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str || "";
      return div.innerHTML;
    }

    async function loadTopicBySlug(topicSlug) {
      if (!topicSlug) return null;

      const { data, error } = await supabaseClient
        .from("topics")
        .select("id, slug")
        .eq("slug", topicSlug)
        .eq("is_active", true)
        .single();

      if (error || !data) {
        console.error("Topic load error:", error);
        return null;
      }

      return data;
    }

   async function loadTopicQuestions(topicSlug, requestedIds = []) {
  const topic = await loadTopicBySlug(topicSlug);

  if (!topic || !topic.id) {
    return [];
  }

  const numericIds = Array.isArray(requestedIds)
    ? requestedIds
        .map((id) => Number(id))
        .filter((id) => !Number.isNaN(id))
    : [];

  // Try loading the requested question IDs first
  if (numericIds.length) {
    const { data: matchedData, error: matchedError } = await supabaseClient
      .from("questions")
      .select("id, topic_id, is_active")
      .eq("topic_id", topic.id)
      .eq("is_active", true)
      .in("id", numericIds)
      .order("id", { ascending: true });

    if (matchedError) {
      console.error("Matched question load error:", matchedError);
    } else if ((matchedData || []).length) {
      return matchedData;
    }
  }

  // Fallback: load the first 4 questions for the topic
  const { data: fallbackData, error: fallbackError } = await supabaseClient
    .from("questions")
    .select("id, topic_id, is_active")
    .eq("topic_id", topic.id)
    .eq("is_active", true)
    .order("id", { ascending: true })
    .limit(4);

  if (fallbackError) {
    console.error("Fallback question load error:", fallbackError);
    return [];
  }

  return fallbackData || [];
}
    function buildPracticeHref(topicSlug) {
      return topicSlug
        ? `/agent-academy/quiz.html?topic=${encodeURIComponent(topicSlug)}`
        : "#";
    }

    function buildQuestionLinksHtml(topicSlug, questions) {
      if (!topicSlug || !Array.isArray(questions) || !questions.length) {
        return `<span class="question-empty">${rt("noPracticeQuestions")}</span>`;
      }

      return questions.map((q) => {
        const href = `/agent-academy/quiz.html?topic=${encodeURIComponent(topicSlug)}&question=${encodeURIComponent(q.id)}`;
        return `<a class="question-link" href="${href}">${rt("question")} ${q.id}</a>`;
      }).join("");
    }

    document.querySelectorAll("[data-lang]").forEach((btn) => {
      btn.onclick = () => {
        lang = btn.dataset.lang;
        localStorage.setItem("lang", lang);

        const sidebarTitle = document.getElementById("playbookSidebarTitle");
        const defaultTitle = document.getElementById("defaultArticleTitle");
        const defaultText = document.getElementById("defaultArticleText");

        if (sidebarTitle) sidebarTitle.textContent = rt("playbook");
        if (defaultTitle) defaultTitle.textContent = rt("selectSectionTitle");
        if (defaultText) defaultText.textContent = rt("selectSectionText");

        loadSidebar().then(() => {
          if (currentArticle) loadArticle(currentArticle);
        });
      };
    });

    async function loadSidebar() {
      const { data, error } = await supabaseClient
        .from("playbook_sections")
        .select("id,title_en,title_fr,title_es,is_free,access_level")
        .order("sort_order");

      if (error) {
        console.error("Sidebar load error:", error);
        return;
      }

      const list = document.getElementById("articleList");
      list.innerHTML = "";

      (data || []).forEach((section) => {
  const a = document.createElement("div");
  a.className = "article-link";

  const sectionTitle =
    lang === "fr" ? section.title_fr :
    lang === "es" ? section.title_es :
    section.title_en;

  const requiredLevel =
    section.access_level || (section.is_free ? "free" : "professional");

  const allowed = hasAccess(window.userPlan || "free", requiredLevel);

  a.textContent = allowed ? sectionTitle : `🔒 ${sectionTitle}`;

  if (!allowed) {
    a.classList.add("locked");
  }

  a.onclick = async () => {
    if (!allowed) {
      showUpgradePrompt(requiredLevel);
      return;
    }

    await loadArticle(section.id);
  };

  list.appendChild(a);
});
    }

    async function loadArticle(id) {
      currentArticle = id;

      const { data, error } = await supabaseClient
        .from("playbook_sections")
        .select("*")
        .eq("id", id)
        .single();

      if (error || !data) {
        console.error("Article load error:", error);
        return;
      }

      const title =
        lang === "fr" ? data.title_fr :
        lang === "es" ? data.title_es :
        data.title_en;

      const text =
        lang === "fr" ? data.text_fr :
        lang === "es" ? data.text_es :
        data.text_en;

      const explanation =
        lang === "fr" ? data.explanation_fr :
        lang === "es" ? data.explanation_es :
        data.explanation_en;

      const regulationHref =
        `/agent-academy/regulation-viewer.html?pdf=${encodeURIComponent("/agent-academy/regulations/" + data.regulation_pdf)}&page=${encodeURIComponent(data.regulation_page || 1)}`;

      const practiceHref = buildPracticeHref(data.topic_slug);

      const relatedIds = Array.isArray(data.related_question_ids)
        ? data.related_question_ids
        : [];

      const relatedQuestions = await loadTopicQuestions(data.topic_slug, relatedIds);

      const keyQuestionsHtml = `
        <div class="related-questions">
          <h3>${rt("keyQuestions")}</h3>
          <div class="question-links">
            ${buildQuestionLinksHtml(data.topic_slug, relatedQuestions)}
          </div>
        </div>
      `;

      document.getElementById("articleContent").innerHTML = `
        <h2 class="article-title">${escapeHtml(title)}</h2>

        <div class="article-text">${escapeHtml(text)}</div>

        <div class="explanation">
          <h3>${rt("explanation")}</h3>
          <p>${escapeHtml(explanation)}</p>
        </div>

        <div class="actions">
          <a href="${regulationHref}">${rt("openRegulation")}</a>
          <a href="${practiceHref}">${rt("practiceQuestions")}</a>
        </div>

        ${keyQuestionsHtml}
      `;
    }

    document.getElementById("playbookSidebarTitle").textContent = rt("playbook");
    document.getElementById("defaultArticleTitle").textContent = rt("selectSectionTitle");
    document.getElementById("defaultArticleText").textContent = rt("selectSectionText");

    loadSidebar();
  </script>
  <script src="/agent-academy/js/academy.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Upgrade Request | Agent Academy</title>

  <style>
    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: #07101d;
      color: #edf3ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 680px;
      padding: 32px;
      border-radius: 20px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 24px 80px rgba(0,0,0,0.34);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 32px;
    }

    p {
      color: rgba(237,243,255,0.75);
      line-height: 1.7;
    }

    .plan {
      margin: 16px 0 22px;
      font-size: 18px;
      font-weight: 700;
      color: #d4af37;
    }

    .notice {
      margin: 18px 0 22px;
      padding: 14px 16px;
      border-radius: 14px;
      background: rgba(212,175,55,0.10);
      border: 1px solid rgba(212,175,55,0.28);
      color: #fff4cf;
      line-height: 1.65;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
    }

    input,
    textarea {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
      color: #edf3ff;
      font: inherit;
      box-sizing: border-box;
    }

    textarea {
      min-height: 130px;
      resize: vertical;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 18px;
      border-radius: 999px;
      border: 1px solid rgba(212,175,55,0.4);
      background: rgba(212,175,55,0.2);
      color: #fff4cf;
      text-decoration: none;
      font-weight: 700;
      cursor: pointer;
    }

    .btn.secondary {
      background: rgba(255,255,255,0.05);
      border-color: rgba(255,255,255,0.12);
      color: #edf3ff;
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .message {
      display: none;
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 14px;
      line-height: 1.65;
    }

    .message.success {
      display: block;
      background: rgba(22,163,74,0.14);
      border: 1px solid rgba(22,163,74,0.35);
      color: #dff7d6;
    }

    .message.error {
      display: block;
      background: rgba(220,38,38,0.14);
      border: 1px solid rgba(220,38,38,0.35);
      color: #ffd9d9;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Upgrade request</h1>

    <p>
      Payments are currently handled manually. Submit your request below and we will contact you with payment instructions.
    </p>

    <div class="plan" id="planName">Selected plan</div>

    <div class="notice">
      After payment is confirmed, your access will be activated manually.
    </div>

    <form id="upgradeRequestForm">
      <input type="hidden" name="_subject" value="New Upgrade Request">
  <input type="hidden" name="_template" value="table">
  <input type="hidden" name="_captcha" value="false">
  <input type="hidden" name="_to" value="jnguegan@gmail.com">
      <div class="field">
        <label for="fullName">Full name</label>
        <input id="fullName" name="fullName" type="text" />
      </div>

      <div class="field">
        <label for="email">Email address</label>
        <input id="email" name="email" type="email" required />
      </div>

      <div class="field">
        <label for="message">Optional message</label>
        <textarea id="message" name="message" placeholder="Add any details here..."></textarea>
      </div>

      <div class="actions">
        <button id="submitBtn" type="submit" class="btn">Send upgrade request</button>
        <a id="backBtn" class="btn secondary" href="/agent-academy/upgrade.html">Back</a>
      </div>
    </form>

    <div id="formMessage" class="message"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/agent-academy/js/supabase-client.js"></script>
  <script src="/agent-academy/js/auth.js"></script>
  <script src="/agent-academy/js/guard.js"></script>
  <script src="/agent-academy/js/academy.js"></script>

  <script>
    const params = new URLSearchParams(window.location.search);
    const rawPlan = (params.get("plan") || "").trim().toLowerCase();

    const planConfig = {
      starter: {
        dbValue: "starter",
        label: "Starter Plan (£199)"
      },
      professional: {
        dbValue: "professional",
        label: "Professional Plan (£599)"
      },
      premium_intensive: {
        dbValue: "platinum",
        label: "Premium Intensive (£895)"
      },
      platinum: {
        dbValue: "platinum",
        label: "Platinum Plan (£895)"
      }
    };

    const selectedPlan = planConfig[rawPlan] || {
      dbValue: "starter",
      label: "Starter Plan (£199)"
    };

    document.getElementById("planName").textContent = selectedPlan.label;
    document.getElementById("backBtn").href = `/agent-academy/upgrade.html`;

    const form = document.getElementById("upgradeRequestForm");
    const submitBtn = document.getElementById("submitBtn");
    const formMessage = document.getElementById("formMessage");

    form.addEventListener("submit", async (e) => {
     e.preventDefault();

// 🔹 TEMPORARY: Dual email notification system
// FormSubmit is kept as a backup to ensure no upgrade request is missed
// while Netlify/Resend reliability is being validated
      
const formData = new FormData(form);

await fetch("https://formsubmit.co/ajax/jnguegan@gmail.com", {
  method: "POST",
  body: formData
});

      formMessage.className = "message";
      formMessage.textContent = "";

      const db = window.supabaseClient || window.sb || null;

      if (!db) {
        formMessage.className = "message error";
        formMessage.textContent = "Supabase is not loaded.";
        return;
      }

      const fullName = document.getElementById("fullName").value.trim();
      const email = document.getElementById("email").value.trim();
      const message = document.getElementById("message").value.trim();

      if (!email) {
        formMessage.className = "message error";
        formMessage.textContent = "Please enter your email address.";
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "Sending...";

      try {
        const { data: { user } } = await db.auth.getUser();

        if (user?.email && !document.getElementById("email").value.trim()) {
          document.getElementById("email").value = user.email;
        }

        const payload = {
          user_id: user?.id || null,
          full_name: fullName || null,
          email: email || user?.email || null,
          requested_plan: selectedPlan.dbValue,
          message: message || null
        };

                const { error } = await db
          .from("upgrade_requests")
          .insert([payload]);

        if (error) throw error;

        // 🔹 PRIMARY (UNDER TEST): Netlify + Resend email notification
// This will become the main system once fully validated
        
        await fetch("/.netlify/functions/send-upgrade-request-email", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            fullName: fullName || "",
            email: email || user?.email || "",
            requestedPlan: selectedPlan.dbValue,
            message: message || ""
          })
        });

        form.reset();

        if (user?.email) {
          document.getElementById("email").value = user.email;
        }

        formMessage.className = "message success";
        formMessage.textContent = "Thank you. Your upgrade request has been received. We will contact you with payment instructions.";
      } catch (err) {
        console.error("Upgrade request error:", err);
        formMessage.className = "message error";
        formMessage.textContent = "We could not submit your request right now. Please try again.";
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Send upgrade request";
      }
    });

    document.addEventListener("DOMContentLoaded", async () => {
      try {
        const db = window.supabaseClient || window.sb || null;
        if (!db) return;

        const { data: { user } } = await db.auth.getUser();
        if (user?.email) {
          document.getElementById("email").value = user.email;
        }
      } catch (err) {
        console.error("Prefill error:", err);
      }
    });
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payment | Agent Academy</title>

  <style>
    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: #07101d;
      color: #edf3ff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .card {
      max-width: 520px;
      padding: 32px;
      border-radius: 20px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      text-align: center;
    }

    h1 {
      margin-bottom: 12px;
    }

    p {
      color: rgba(237,243,255,0.75);
      line-height: 1.6;
    }

    .plan {
      margin: 16px 0;
      font-size: 18px;
      font-weight: 700;
      color: #d4af37;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 18px;
      border-radius: 999px;
      background: rgba(212,175,55,0.2);
      border: 1px solid rgba(212,175,55,0.4);
      color: #fff4cf;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Payment page (coming next)</h1>

    <p>
      You are about to upgrade your Agent Academy access.
      Payment integration (Stripe) will be added next.
    </p>

    <div class="plan" id="planName"></div>

    <button id="payBtn" class="btn">Proceed to payment</button>
  </div>


  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/agent-academy/js/supabase-client.js"></script>
<script src="/agent-academy/js/auth.js"></script>
<script src="/agent-academy/js/guard.js"></script>
<script src="/agent-academy/js/academy.js"></script>
  <script>

const params = new URLSearchParams(window.location.search);
const plan = params.get("plan");

const planMap = {
  starter: "Starter Plan (£149)",
  professional: "Professional Plan (£395)",
  premium_intensive: "Premium Intensive (£895)"
};

document.getElementById("planName").textContent =
  planMap[plan] || "Selected plan";

const payBtn = document.getElementById("payBtn");

payBtn.addEventListener("click", async () => {
  try {
    payBtn.textContent = "Redirecting...";
    payBtn.disabled = true;

    const db = window.supabaseClient || window.sb || null;

    if (!db) {
      alert("Auth not loaded");
      return;
    }

    const {
      data: { user }
    } = await db.auth.getUser();

    if (!user) {
      alert("You must be logged in");
      window.location.href = "/agent-academy/login.html";
      return;
    }

   const res = await fetch("/.netlify/functions/create-checkout-session", {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify({
    plan,
    userId: user.id,
    email: user.email
  })
});

const data = await res.json();

console.log("CHECKOUT RESPONSE STATUS:", res.status);
console.log("CHECKOUT RESPONSE DATA:", JSON.stringify(data));
alert(JSON.stringify(data));

if (data.url) {
  window.location.href = data.url;
} else {
  alert(data.error || "Unable to start payment");
  payBtn.disabled = false;
  payBtn.textContent = "Proceed to payment";
}
    
  } catch (err) {
    console.error(err);
    alert("Payment error");
    payBtn.disabled = false;
    payBtn.textContent = "Proceed to payment";
  }
});

   
    
  </script>

</body>
</html>

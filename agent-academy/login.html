<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Football Agent Exam Prep Platform</title>

  <style>
    :root{
      --bg:#0b1220;
      --panel:#162033;
      --text:#f5f7fb;
      --muted:#b7c0cf;
      --gold:#d4af37;
      --gold-dark:#b8921f;
      --border:rgba(255,255,255,0.08);
      --danger:#ff7b7b;
      --success:#6ee7a8;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      font-family:Arial,Helvetica,sans-serif;
      background:
        radial-gradient(circle at top right, rgba(212,175,55,0.12), transparent 25%),
        radial-gradient(circle at left, rgba(87,124,255,0.10), transparent 22%),
        var(--bg);
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .lang-switch{
      position:absolute;
      top:20px;
      right:20px;
      display:flex;
      gap:8px;
    }

    .lang-switch button{
      border:1px solid var(--border);
      background:transparent;
      color:var(--text);
      padding:8px 12px;
      border-radius:999px;
      cursor:pointer;
      transition:0.2s ease;
    }

    .lang-switch button:hover,
    .lang-switch button.active{
      background:var(--gold);
      color:#07111f;
      border-color:var(--gold);
    }

    .card{
      width:100%;
      max-width:420px;
      background:rgba(22,32,51,0.96);
      border:1px solid var(--border);
      border-radius:20px;
      padding:32px;
      box-shadow:0 18px 50px rgba(0,0,0,0.35);
    }

    .eyebrow{
      margin:0 0 8px;
      color:var(--gold);
      text-transform:uppercase;
      letter-spacing:0.14em;
      font-size:0.78rem;
      font-weight:700;
    }

    h1{
      margin:0 0 10px;
      font-size:1.9rem;
      line-height:1.15;
    }

    .lead{
      margin:0 0 24px;
      color:var(--muted);
      font-size:0.98rem;
      line-height:1.6;
    }

    .field{
      margin-bottom:16px;
    }

    label{
      display:block;
      margin-bottom:8px;
      font-size:0.95rem;
      font-weight:700;
    }

    input{
      width:100%;
      min-height:50px;
      padding:0 14px;
      border-radius:12px;
      border:1px solid var(--border);
      background:#0d1728;
      color:var(--text);
      font-size:0.98rem;
      outline:none;
    }

    input:focus{
      border-color:var(--gold);
    }

    .btn{
      width:100%;
      min-height:50px;
      border:none;
      border-radius:12px;
      background:var(--gold);
      color:#07111f;
      font-weight:700;
      font-size:1rem;
      cursor:pointer;
      transition:0.2s ease;
    }

    .btn:hover{
      background:var(--gold-dark);
    }

    .helper{
      margin-top:18px;
      text-align:center;
      color:var(--muted);
      font-size:0.94rem;
      line-height:1.5;
    }

    .helper a{
      color:var(--gold);
      text-decoration:none;
      font-weight:700;
    }

    .message{
      margin-top:16px;
      min-height:22px;
      font-size:0.94rem;
      color:var(--muted);
    }

    .message.error{
      color:var(--danger);
    }

    .message.success{
      color:var(--success);
    }
  </style>
</head>
<body>

  <div class="lang-switch">
    <button type="button" data-lang="en" class="active">EN</button>
    <button type="button" data-lang="fr">FR</button>
    <button type="button" data-lang="es">ES</button>
  </div>

  <div class="card">
    <p class="eyebrow" data-i18n="login.badge">Football Agent Exam Prep Platform</p>
    <h1 data-i18n="login.heading">Login</h1>
    <p class="lead" data-i18n="login.lead">
      Access your dashboard, continue your revision, and track your progress.
    </p>

    <form id="loginForm">
      <div class="field">
        <label for="email" data-i18n="login.emailLabel">Email</label>
        <input type="email" id="email" required />
      </div>

      <div class="field">
        <label for="password" data-i18n="login.passwordLabel">Password</label>
        <input type="password" id="password" required />
      </div>

      <button type="submit" class="btn" data-i18n="login.button">Login</button>
      <p id="message" class="message"></p>
    </form>

    <p class="helper">
      <span data-i18n="login.noAccount">Do not have an account?</span>
      <a href="/agent-academy/signup.html" data-i18n="login.signupLink">Create one here</a>
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/agent-academy/js/supabase-client.js"></script>

  <script>
    let translations = {};
    let currentLang = localStorage.getItem("academyLang") || "en";

    async function loadLang(lang){
      try{
        const res = await fetch(`/agent-academy/i18n/${lang}.json`, { cache: "no-store" });
        translations = await res.json();

        document.querySelectorAll("[data-i18n]").forEach((el) => {
          const key = el.getAttribute("data-i18n");
          if (translations[key]) {
            el.textContent = translations[key];
          }
        });

        document.documentElement.lang = lang;
        currentLang = lang;
        localStorage.setItem("academyLang", lang);

        document.querySelectorAll(".lang-switch button").forEach((btn) => {
          btn.classList.toggle("active", btn.dataset.lang === lang);
        });

        if (translations["login.pageTitle"]) {
          document.title = translations["login.pageTitle"];
        }
      } catch (error) {
        console.error("Language load error:", error);
      }
    }

    function getText(key, fallback){
      return translations[key] || fallback;
    }

    document.querySelectorAll(".lang-switch button").forEach((btn) => {
      btn.addEventListener("click", () => loadLang(btn.dataset.lang));
    });

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const message = document.getElementById("message");

      message.className = "message";
      message.textContent = "";

      const { error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        message.textContent = error.message;
        message.classList.add("error");
        return;
      }

      message.textContent = getText("login.success", "Login successful. Redirecting...");
      message.classList.add("success");

      setTimeout(() => {
        window.location.href = "/agent-academy/dashboard.html";
      }, 700);
    });

    loadLang(currentLang);
  </script>
</body>
</html>

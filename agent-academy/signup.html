<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title data-i18n="signup.title">Create Account</title>

<style>

body{
font-family:Arial,Helvetica,sans-serif;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:#1e293b;
padding:40px;
border-radius:10px;
width:340px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

h1{
margin-top:0;
font-size:22px;
text-align:center;
}

input{
width:100%;
padding:12px;
margin-top:12px;
border-radius:6px;
border:none;
}

button{
width:100%;
padding:12px;
margin-top:16px;
background:#d4af37;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

#message{
margin-top:12px;
font-size:14px;
}

.language-switch{
position:absolute;
top:20px;
right:20px;
}

.language-switch button{
margin-left:6px;
}

</style>

</head>

<body>

<div class="language-switch">

<button onclick="setLang('en')">EN</button>
<button onclick="setLang('fr')">FR</button>
<button onclick="setLang('es')">ES</button>

</div>

<div class="container">

<h1 data-i18n="signup.heading">Create Account</h1>

<form id="signupForm">

<input type="email" id="email" placeholder="Email" required>

<input type="password" id="password" placeholder="Password" required>

<button type="submit" data-i18n="signup.button">Sign Up</button>

</form>

<p id="message"></p>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/agent-academy/js/supabase-client.js"></script>

<script>

let translations={}
let currentLang="en"

async function loadLang(lang){

const res=await fetch(`/agent-academy/i18n/${lang}.json`)
translations=await res.json()

document.querySelectorAll("[data-i18n]").forEach(el=>{
const key=el.getAttribute("data-i18n")
if(translations[key]) el.textContent=translations[key]
})

currentLang=lang
localStorage.setItem("academyLang",lang)

}

function setLang(lang){
loadLang(lang)
}

document.getElementById("signupForm").addEventListener("submit",async(e)=>{

e.preventDefault()

const email=document.getElementById("email").value
const password=document.getElementById("password").value

const {data,error}=await supabaseClient.auth.signUp({
email:email,
password:password
})

if(error){

document.getElementById("message").innerText=error.message

}else{

document.getElementById("message").innerText=translations["signup.success"]

}

})

const savedLang=localStorage.getItem("academyLang")||"en"
loadLang(savedLang)

</script>

</body>
</html>
